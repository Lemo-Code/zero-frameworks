# ============================================================================
# Zero Framework 全量配置文件
# ============================================================================
# 说明：
#   此文件包含 Zero Framework 所有模块的完整配置参数。
#   每个参数都有详细注释说明其用途和可选值。
#   用户需要启用某个功能时，取消对应行的注释即可。
#   配置加载优先级（后者覆盖前者）：
#     1. 代码默认值 → 2. 此配置文件 → 3. 环境变量 → 4. 命令行参数
#
#   启动方式：
#     ./zero_app                    # 使用默认 conf/application.yml
#     ./zero_app -c /path/to/conf   # 指定配置目录
#     ./zero_app --servers.kv.enabled=1 --app.workers=8  # 命令行覆盖
# ============================================================================


# ============================================================================
# 应用全局配置 (app.*)
# ============================================================================
app:
  # 应用名称，用于日志、服务注册、指标上报等
  name: zero-application

  # 应用版本号
  version: 1.0.0

  # PID 文件路径，空字符串表示不写入 PID 文件
  # 示例: "/var/run/zero-app.pid"
  pid_file: ""

  # 是否以守护进程模式运行 (0=前台, 1=守护进程)
  # 守护进程模式下会自动 fork 到后台，并重定向 stdout/stderr 到 /dev/null
  daemon: 0

  # IOManager 工作线程数（协程调度器线程池大小）
  # 建议设置为 CPU 核心数或 2*CPU 核心数
  workers: 4

  # 是否启用 fiber I/O hook (0=禁用, 1=启用)
  # 启用后，所有阻塞 I/O 操作（sleep/connect/read/write）会自动让出协程
  # 这是 Zero Framework 高性能的关键，建议始终启用
  hook_enable: 1

  # 配置文件目录路径（相对于可执行文件的路径）
  config_path: conf


# ============================================================================
# 服务器配置 (servers.*)
# ============================================================================
# 支持同时启用多个服务器，每个服务器独立配置。
# 目前支持: http, kv, rpc, ws
# ============================================================================

servers:
  # --------------------------------------------------------------------------
  # HTTP 服务器 (servers.http.*)
  # --------------------------------------------------------------------------
  http:
    # 是否启用 HTTP 服务器 (0=禁用, 1=启用)
    enabled: 1

    # 监听地址列表，支持多个地址同时监听
    address:
      - "0.0.0.0:8080"
      # - "0.0.0.0:8082"    # 额外监听端口
      # - "[::]:8080"       # IPv6

    # 是否支持 HTTP 长连接 (0=禁用, 1=启用)
    keepalive: 1

    # 连接超时时间（毫秒），超过此时间无数据则断开连接
    timeout: 120000

    # 服务器名称，用于日志和指标
    name: http-server

    # 是否启用 SSL/TLS (0=禁用, 1=启用)
    ssl: 0

    # SSL 证书文件路径（启用 ssl 时必填）
    cert_file: ""

    # SSL 私钥文件路径（启用 ssl 时必填）
    key_file: ""

  # --------------------------------------------------------------------------
  # KV (Redis兼容) 服务器 (servers.kv.*)
  # --------------------------------------------------------------------------
  kv:
    # 是否启用 KV 服务器 (0=禁用, 1=启用)
    enabled: 0

    # 监听地址列表
    address:
      - "0.0.0.0:6379"

    # 连接超时时间（毫秒）
    timeout: 120000

    # 服务器名称
    name: kv-server

    # RDB 持久化文件路径
    rdb_path: "./dump.rdb"

    # AOF 持久化文件路径
    aof_path: "./appendonly.aof"

    # 是否启用 AOF 持久化 (0=禁用, 1=启用)
    aof_enabled: 0

    # 自动保存间隔（秒），0 表示禁用自动保存
    autosave_sec: 60

    # HTTP 管理接口端口 (0=禁用管理接口)
    # 启用后可通过 HTTP 查看 Redis 状态、执行 SAVE 等管理操作
    http_admin_port: 0

    # RPC 服务端口 (0=禁用 RPC)
    # 启用后支持 Sentinel 健康检查和 SLAVEOF 命令
    rpc_port: 0

  # --------------------------------------------------------------------------
  # RPC 服务器 (servers.rpc.*)
  # --------------------------------------------------------------------------
  rpc:
    # 是否启用 RPC 服务器 (0=禁用, 1=启用)
    enabled: 0

    # 监听地址列表
    address:
      - "0.0.0.0:9090"

    # 连接超时时间（毫秒）
    timeout: 120000

    # 服务器名称
    name: rpc-server

  # --------------------------------------------------------------------------
  # WebSocket 服务器 (servers.ws.*)
  # --------------------------------------------------------------------------
  ws:
    # 是否启用 WebSocket 服务器 (0=禁用, 1=启用)
    enabled: 0

    # 监听地址列表
    address:
      - "0.0.0.0:8081"

    # 连接超时时间（毫秒）
    timeout: 120000

    # 服务器名称
    name: ws-server


# ============================================================================
# 优雅关闭配置 (shutdown.*)
# ============================================================================
shutdown:
  # 优雅关闭超时时间（毫秒）
  # 收到 SIGINT/SIGTERM 后，等待活跃连接关闭的最大时间
  timeout: 30000


# ============================================================================
# 日志配置 (logs.*)
# ============================================================================
# 日志系统支持多 logger、多 appender、多级别过滤。
# 每个 logger 可以有独立的级别和输出目标。
# ============================================================================
logs:
  # 根 logger 配置
  - name: root
    # 日志级别: DEBUG < INFO < WARN < ERROR < FATAL
    level: INFO
    # 输出目标列表
    appenders:
      - type: StdoutLogAppender    # 输出到控制台
        # 日志格式模板
        # %p=级别 %d=时间 %t=线程ID %F=文件名 %l=行号 %m=消息 %n=换行
        pattern: "%d{%Y-%m-%d %H:%M:%S}%T%t%T%F%T[%p]%T[%c]%T%f:%l%T%m%n"
      # - type: FileLogAppender      # 输出到文件
      #   file: ./logs/system.log
      #   pattern: "%d{%Y-%m-%d %H:%M:%S}%T%t%T%F%T[%p]%T[%c]%T%f:%l%T%m%n"
      # - type: AsyncLogAppender    # 异步输出到文件（高吞吐场景）
      #   file: ./logs/async.log
      #   pattern: "%d{%Y-%m-%d %H:%M:%S}%T%t%T%F%T[%p]%T[%c]%T%f:%l%T%m%n"

  # HTTP 访问日志（独立 logger）
  # - name: http_access
  #   level: INFO
  #   appenders:
  #     - type: FileLogAppender
  #       file: ./logs/access.log
  #       pattern: "%d{%Y-%m-%d %H:%M:%S}%T%m%n"


# ============================================================================
# Fiber 协程配置 (fiber.*)
# ============================================================================
fiber:
  # 协程栈大小（字节），默认 128KB
  # 每个协程有独立的栈空间，过小会导致栈溢出
  stack_size: 131072

  # 是否启用栈溢出保护 (0=禁用, 1=启用)
  # 启用后会在栈底设置 guard page，检测栈溢出
  stack_guard: 1


# ============================================================================
# TCP 服务器通用配置 (tcp_server.*)
# ============================================================================
tcp_server:
  # 读超时时间（毫秒），超过此时间无数据则断开连接
  read_timeout: 120000

  # 写超时时间（毫秒）
  write_timeout: 120000

  # 接收缓冲区大小（字节）
  recv_buffer: 65536

  # 发送缓冲区大小（字节）
  send_buffer: 65536

  # 是否启用 TCP KeepAlive (0=禁用, 1=启用)
  # 启用后操作系统会自动检测死连接
  keepalive: 1

  # 最大并发连接数，0 表示无限制
  max_connections: 0


# ============================================================================
# HTTP 服务器高级配置 (http_server.*)
# ============================================================================
http_server:
  # 请求体最大大小（字节），超过则返回 413 Payload Too Large
  max_body_size: 67108864

  # 请求头最大大小（字节）
  max_header_size: 65536

  # 是否启用请求解析优化 (0=标准解析, 1=最小化解析)
  # 最小化解析跳过部分 HTTP 头解析，提升性能但功能受限
  minimal_parse: 0


# ============================================================================
# KV 服务器高级配置 (kv_server.*)
# ============================================================================
kv_server:
  # 最大客户端连接数
  max_clients: 10000

  # 慢查询日志阈值（微秒），超过此时间的查询会被记录
  slowlog_threshold_us: 10000

  # 最大内存限制（字节），0 表示无限制
  # 达到限制后会根据淘汰策略释放内存
  maxmemory: 0

  # 内存淘汰策略
  # 可选: noeviction(不淘汰) | allkeys-lru | allkeys-random | volatile-lru | volatile-random | volatile-ttl
  maxmemory_policy: noeviction


# ============================================================================
# 工作线程组配置 (workers.*)
# ============================================================================
# 命名的工作线程组，用于将不同类型的工作分配到不同线程池。
# ============================================================================
workers:
  # 主工作线程组（用于一般业务处理）
  main:
    thread_num: 4
    worker_num: 64

  # IO 工作线程组（用于网络 IO）
  # io:
  #   thread_num: 2
  #   worker_num: 32

  # 定时任务线程组
  # timer:
  #   thread_num: 1
  #   worker_num: 8


# ============================================================================
# 服务注册配置 (registry.*)
# ============================================================================
# 支持 etcd 服务注册与发现
# ============================================================================
registry:
  # 是否启用服务注册 (0=禁用, 1=启用)
  enabled: 0

  # 注册中心类型，目前仅支持 etcd
  type: etcd

  # etcd 服务器地址列表
  endpoints:
    - "http://127.0.0.1:2379"

  # 服务注册间隔（秒）
  heartbeat_interval: 30

  # 服务实例信息
  service_name: zero-service
  instance_id: zero-1
  host: 127.0.0.1
  port: 8080


# ============================================================================
# 指标监控配置 (metrics.*)
# ============================================================================
# Prometheus 指标暴露配置
# ============================================================================
metrics:
  # 是否启用 Prometheus 指标 (0=禁用, 1=启用)
  enabled: 0

  # 指标暴露路径（通过 HTTP 访问）
  path: /metrics

  # 指标前缀
  prefix: zero_


# ============================================================================
# 链路追踪配置 (trace.*)
# ============================================================================
# OpenTelemetry 分布式追踪配置
# ============================================================================
trace:
  # 是否启用链路追踪 (0=禁用, 1=启用)
  enabled: 0

  # 服务名称
  service_name: zero-service

  # 服务版本
  service_version: 1.0.0

  # 采样率 (0.0~1.0)，1.0 表示全量采样
  sample_rate: 0.1


# ============================================================================
# 缓存配置 (cache.*)
# ============================================================================
cache:
  # 是否启用内存缓存 (0=禁用, 1=启用)
  enabled: 0

  # 最大缓存条目数
  max_size: 1000

  # 默认过期时间（毫秒），0 表示永不过期
  default_ttl: 30000


# ============================================================================
# 安全配置 (security.*)
# ============================================================================
security:
  # JWT 认证密钥（空字符串表示不启用 JWT 认证）
  jwt_secret: ""

  # JWT 签发者
  jwt_issuer: zero-framework

  # 速率限制配置
  rate_limit:
    # 是否启用 (0=禁用, 1=启用)
    enabled: 0
    # 每秒请求数
    qps: 100
    # 突发容量
    burst: 200

  # CORS 跨域配置
  cors:
    # 是否启用 (0=禁用, 1=启用)
    enabled: 0
    # 允许的源
    allow_origins:
      - "*"
    # 允许的方法
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
    # 允许的请求头
    allow_headers:
      - Content-Type
      - Authorization


# ============================================================================
# 数据库配置 (db.*)
# ============================================================================
db:
  # MySQL 连接池配置
  mysql:
    # 是否启用 (0=禁用, 1=启用)
    enabled: 0
    # 连接池大小
    pool_size: 10
    # 主机地址
    host: 127.0.0.1
    # 端口
    port: 3306
    # 数据库名
    database: zero_db
    # 用户名
    username: root
    # 密码
    password: ""
    # 连接超时（毫秒）
    connect_timeout: 5000
    # 读取超时（毫秒）
    read_timeout: 30000
    # 写入超时（毫秒）
    write_timeout: 30000


# ============================================================================
# 消息队列配置 (mq.*)
# ============================================================================
mq:
  # Kafka 配置
  kafka:
    # 是否启用 (0=禁用, 1=启用)
    enabled: 0
    # Kafka 服务器地址列表
    brokers:
      - "127.0.0.1:9092"
    # 消费者组 ID
    consumer_group: zero-consumer
    # 自动提交偏移量 (0=手动, 1=自动)
    auto_commit: 1


# ============================================================================
# 健康检查配置 (health.*)
# ============================================================================
health:
  # 健康检查端点路径
  healthz_path: /healthz
  readyz_path: /readyz
  livez_path: /livez

  # 就绪检查配置
  readiness:
    # 依赖服务检查超时（毫秒）
    timeout: 5000


# ============================================================================
# 配置热重载 (config_reload.*)
# ============================================================================
config_reload:
  # 是否启用配置文件热重载 (0=禁用, 1=启用)
  # 启用后会使用 inotify 监控配置文件目录，文件变化时自动重载
  enabled: 1

  # 防抖时间（毫秒），避免频繁重载
  debounce_ms: 300


# ============================================================================
# 性能调优 (performance.*)
# ============================================================================
performance:
  # 是否启用 CPU 亲和性绑定 (0=禁用, 1=启用)
  # 启用后将线程绑定到特定 CPU 核心，减少缓存失效
  cpu_affinity: 0

  # 是否启用忙等待优化 (0=禁用, 1=启用)
  # 低延迟场景可启用，但会增加 CPU 占用
  busy_poll: 0

  # 连接亲和性 (0=轮询, 1=基于 fd 哈希)
  # 启用后同一连接始终由同一线程处理，提升缓存命中率
  connection_affinity: 1
