syntax = "proto3";

package zero.rpc;

import "zero/rpc/proto/common.proto";

// KvNodeService — called by sentinel leader on each KV node

message HealthCheckRequest {
  string caller_id = 1;
}

message HealthCheckResponse {
  bool ok = 1;
  string node_id = 2;
  NodeRole role = 3;
  string replication_id = 4;
  int64 replication_offset = 5;
  int32 connected_replicas = 6;
}

message ReplicaOfRequest {
  string master_host = 1;  // empty → promote to master (SLAVEOF NO ONE)
  int32 master_port = 2;
  uint64 term = 3;         // sentinel leader term for fencing
}

message ReplicaOfResponse {
  bool accepted = 1;
  string error = 2;
}

message GetNodeStatusRequest {}

message GetNodeStatusResponse {
  string node_id = 1;
  NodeRole role = 2;
  string replication_id = 3;
  int64 replication_offset = 4;
  int32 connected_replicas = 5;
  string master_host = 6;
  int32 master_port = 7;
  int64 master_link_status = 8;
}

service KvNodeService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc ReplicaOf(ReplicaOfRequest) returns (ReplicaOfResponse);
  rpc GetNodeStatus(GetNodeStatusRequest) returns (GetNodeStatusResponse);
}
